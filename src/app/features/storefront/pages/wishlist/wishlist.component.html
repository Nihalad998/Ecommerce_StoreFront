<div class="max-w-[1600px] mx-auto p-4 lg:p-8">
  <div class="flex items-center justify-between mb-8">
    <div>
      <h1 class="text-3xl lg:text-5xl font-bold">Wishlist</h1>
      <p class="mt-2 text0slate-400">{{ wishlistStore.count() }} items saved</p>
    </div>
    <a routerLink="/" class="px-4 py-2 rounded-xl bg-slate-800"
      >Continue Shopping</a
    >
  </div>
  @if (wishlistStore.items().length) {
    <div class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-6">
      @for (product of wishlistStore.items(); track product.id) {
        <app-product-card [product]="product" />
      }
    </div>
  } @else {
    <div class="text-center py-20">
      <div class="text-6xl mb-4">❤️</div>
      <h2 class="text-2xl font-semibold">Wishlist Empty</h2>
      <p class="mt-2 text-slate-400">Save products to view them later</p>
    </div>
  }
</div>
