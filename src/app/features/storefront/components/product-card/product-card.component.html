<div
  (click)="openProduct()"
  class="cursor-pointer w-full bg-slate-900 rounded-2xl overflow-hidden border border-slate-800 hover:border-indigo-500 transition-all duration-300"
>
  <div class="relative">
    <img
      [src]="product.thumbnail"
      [alt]="product.title"
      loading="lazy"
      class="w-full h-52 object-contain bg-slate-950 p-4"
    />

    <button
      (click)="toggleWishlist($event)"
      class="absolute top-3 right-3 w-8 h-8 rounded-full bg-slate-800"
    >
      @if (wishlistStore.isWishlisted(product.id)) {
        ❤️
      } @else {
        🤍
      }
    </button>
  </div>

  <div class="p-4">
    <h3 class="font-semibold line-clamp-2 h-14">
      {{ product.title }}
    </h3>

    <div class="mt-2 text-yellow-400">⭐ {{ product.rating }}</div>

    <div class="mt-3 flex items-center gap-2">
      <span class="text-xl font-bold text-indigo-400">
        ₹{{ product.price }}
      </span>

      <span class="text-sm text-slate-500 line-through">
        ₹{{ product.price + 500 }}
      </span>
    </div>

    <button
      (click)="$event.stopPropagation(); addToCart()"
      class="mt-4 w-full h-11 rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600"
    >
      @if (addedToCart()) {
        ✓ Added
      } @else {
        Add To Cart
      }
    </button>
  </div>
</div>
