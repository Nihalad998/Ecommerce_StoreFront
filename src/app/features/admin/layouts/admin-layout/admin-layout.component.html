<div class="h-screen flex bg-slate-950 text-white">
  <!-- Sidebar -->

  <app-admin-sidebar
    [menuOpen]="menuOpen()"
    (closeMenu)="menuOpen.set(false)"
  />

  <main class="flex-1 overflow-y-auto overflow-x-hidden">
    <!-- Mobile Header -->
    <div
      class="md:hidden h-16 px-4 flex items-center border-b border-slate-800 bg-slate-950 sticky top-0 z-30"
    >
      <button class="text-2xl" (click)="menuOpen.set(true)">☰</button>

      <h1 class="ml-4 text-xl font-bold text-indigo-400">Admin</h1>
    </div>

    <router-outlet />
  </main>
</div>
