<div class="p-4 lg:p-8">
  <!-- Header -->

  <div class="mb-8">
    <h1 class="text-3xl font-bold">Analytics</h1>

    <p class="text-slate-400 mt-2">Revenue insights and performance metrics</p>
  </div>

  <!-- KPI Cards -->

  <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4 mb-8">
    <div
      class="bg-slate-900 border border-slate-800 rounded-2xl p-5 hover:border-indigo-500 hover:-translate-y-1 transition-all duration-300"
    >
      <p class="text-slate-400">Total Revenue</p>

      <h2 class="text-3xl font-bold text-green-400 mt-2">
        ₹{{ adminData.revenue() }}
      </h2>
    </div>

    <div
      class="bg-slate-900 border border-slate-800 rounded-2xl p-5 hover:border-indigo-500 hover:-translate-y-1 transition-all duration-300"
    >
      <p class="text-slate-400">Orders</p>

      <h2 class="text-3xl font-bold text-indigo-400 mt-2">
        {{ adminData.orders() }}
      </h2>
    </div>

    <div
      class="bg-slate-900 border border-slate-800 rounded-2xl p-5 hover:border-indigo-500 hover:-translate-y-1 transition-all duration-300"
    >
      <p class="text-slate-400">Customers</p>

      <h2 class="text-3xl font-bold text-yellow-400 mt-2">
        {{ adminData.customers() }}
      </h2>
    </div>

    <div
      class="bg-slate-900 border border-slate-800 rounded-2xl p-5 hover:border-indigo-500 hover:-translate-y-1 transition-all duration-300"
    >
      <p class="text-slate-400">Conversion Rate</p>

      <h2 class="text-3xl font-bold text-purple-400 mt-2">4.8%</h2>
    </div>
  </div>

  <!-- Charts -->
  <div class="grid grid-cols-1 xl:grid-cols-2 gap-6 mb-8">
    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6">
      <h2 class="text-xl font-semibold mb-4">Revenue Trend</h2>

      <div class="h-[300px] flex items-center justify-center text-slate-500">
        <canvas #revenueChart></canvas>
      </div>
    </div>

    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6">
      <h2 class="text-xl font-semibold mb-4">Orders Trend</h2>

      <div class="h-[300px] flex items-center justify-center text-slate-500">
        <canvas #ordersChart></canvas>
      </div>
    </div>
  </div>

  <!-- Bottom Widgets -->
  <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6">
    <h2 class="text-xl font-semibold mb-4">Category Distribution</h2>

    <div class="h-[500px]">
      <canvas #categoryChart></canvas>
    </div>
  </div>
</div>
